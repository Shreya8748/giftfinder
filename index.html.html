.gift-card{

.gift-card:hover{

}

.gift-card img{
width:200px;

}

button{

border-radius:5px;

button:hover{

padding:6px 10px;

function findGift(){

let occasion=document.getElementById("occasion").value;
let budget=document.getElementById("budget").value;

let resultDiv=document.getElementById("result");

/* Search animation */
resultDiv.innerHTML="<p>🔎 Searching gifts...</p>";

setTimeout(function(){

resultDiv.innerHTML="";

let found=false;

for(let i=0;i<gifts.length;i++){

if(gifts[i].occasion===occasion && gifts[i].budget===budget){

found=true;

let card=document.createElement("div");
card.className="gift-card";

card.innerHTML=`
<img src="${gifts[i].img}">
<h3>${gifts[i].name}</h3>
<a href="${gifts[i].link}" target="_blank">Buy Now</a>
`;

resultDiv.appendChild(card);

}

}

if(!found){
resultDiv.innerHTML="<p>No gifts found for this selection</p>";
}

},500);

}
